<!DOCTYPE html>
<html>
<head>
<title>Detection Result</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

<h1>🌿 Detection Result</h1>

<div class="result-card">

<h2>{{ result }}</h2>

<p>Disease Type: <b>{{ disease }}</b></p>

<p>Disease Percentage: <b>{{ percent }}%</b></p>

<img src="{{ url_for('static', filename=image) }}" class="result-image">

<a href="/" class="button">Upload Another Image</a>

</div>

</div>

</body>
</html>
